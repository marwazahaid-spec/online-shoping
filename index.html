<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🛒 ShopMart</div>

    <input type="text" id="search" placeholder="Search products...">

    <button id="cart-btn">
        🛒 Cart <span id="cart-count">0</span>
    </button>
</header>

<section class="hero">
    <h1>Welcome to ShopMart</h1>
    <p>Best Products at Best Prices</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Phone">
        <h3>iPhone</h3>
        <p>Rs. 120000</p>
        <button class="add-cart">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Shoes">
        <h3>Nike Shoes</h3>
        <p>Rs. 12000</p>
        <button class="add-cart">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Watch">
        <h3>Smart Watch</h3>
        <p>Rs. 8500</p>
        <button class="add-cart">Add to Cart</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
